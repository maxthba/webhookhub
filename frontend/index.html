<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebhookHub | Login</title>
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <h1>Login</h1>

            <form class="login-form">
                <label>
                    <span>E-mail</span>
                    <input type="email" placeholder="Exemplo@gmail.com" id="email">
                </label>

                <label>
                    <span>Senha</span>
                    <input type="password" placeholder="Sua senha" id="senha">
                </label>

                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
