<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../css/dashboard.css">
  <title>WebhookHub | Dashboard</title>
</head>
<body>
  <div class="app-brand">
    <img src="../assets/logo%20webhookhub.png" alt="Logo WebhookHub" class="app-logo" />
  </div>

  <div class="panel">
    <header>
      <h1>Meus Webhooks</h1>
      <div>
        <button id="btn-logout">Logout</button>
      </div>
    </header>

    <main>
      <div id="loading">Carregando...</div>
      <div id="content">
        <div class="cards" id="cards"></div>
      </div>
    </main>
  </div>

  <button id="btn-create-webhook" class="fab" type="button" aria-label="Criar webhook">+</button>

  <div id="create-webhook-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="create-webhook-title">
      <div class="modal-header">
        <h2 id="create-webhook-title">Criar webhook</h2>
        <button id="btn-close-modal" class="icon-button" type="button" aria-label="Fechar">×</button>
      </div>

      <form id="create-webhook-form" class="modal-form">
        <label for="webhook-name">
          <span>Nome do webhook</span>
          <input id="webhook-name" name="webhook-name" type="text" placeholder="Ex.: Pedidos da loja" maxlength="80" required />
        </label>

        <p id="create-webhook-message" class="modal-message"></p>

        <div class="modal-actions">
          <button id="btn-cancel-create" class="secondary-button" type="button">Cancelar</button>
          <button id="btn-submit-create" class="primary-button" type="submit">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
