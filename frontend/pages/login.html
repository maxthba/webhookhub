<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <title>WebhookHub | Login</title>
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <img id= "logo" src="../assets/logo webhookhub.png" alt="logo do webhookhub">
            <h1>Login</h1>

            <form class="login-form">
                <label>
                    <span>E-mail</span>
                    <input type="email" placeholder="Exemplo@gmail.com" id="email">
                </label>

                <label>
                    <span>Senha</span>
                    <input type="password" placeholder="Sua senha" id="senha">
                </label>

                <button type="submit">Entrar</button>
                <p id="login-menssage"></p>
            </form>
        </section>
    </main>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
